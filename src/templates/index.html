<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭圈用户识别系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 15px 30px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1.1em;
            color: #666;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            font-weight: bold;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .search-box input, .search-box select {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }
        
        .search-box button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        
        .search-box button:hover {
            background: #5568d3;
        }
        
        .family-circle-list {
            display: grid;
            gap: 15px;
        }
        
        .circle-card {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .circle-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .circle-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .circle-card .members {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .member-tag {
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #ddd;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        
        .member-tag:hover {
            background: #f0f0f0;
        }
        
        .member-tag.key-person {
            background: #ffd700;
            border-color: #ffd700;
            font-weight: bold;
        }
        
        .user-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .user-info h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .info-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .info-label {
            font-weight: bold;
            width: 150px;
            color: #666;
        }
        
        .info-value {
            flex: 1;
            color: #333;
        }
        
        .chart-container {
            margin: 30px 0;
            height: 400px;
            position: relative;
        }
        
        .relationship-check {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .relationship-check h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .relationship-result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }
        
        .relationship-result.is-family {
            background: #d4edda;
            color: #155724;
        }
        
        .relationship-result.not-family {
            background: #f8d7da;
            color: #721c24;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        .pagination button {
            padding: 8px 15px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .pagination button:hover:not(:disabled) {
            background: #f0f0f0;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination .page-info {
            padding: 8px 15px;
        }
        
        #graph-container {
            width: 100%;
            height: 600px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #fafafa;
        }
        
        .graph-controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .search-results {
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: white;
        }
        
        .search-result-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        
        .search-result-item:hover {
            background: #f0f0f0;
        }
        
        .search-result-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 家庭圈用户识别系统</h1>
        
        <!-- 统计信息 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h3>训练数据</h3>
                <div class="value" id="trainUsers">-</div>
                <div>用户数</div>
            </div>
            <div class="stat-card">
                <h3>家庭圈数量</h3>
                <div class="value" id="totalCircles">-</div>
                <div>识别结果</div>
            </div>
            <div class="stat-card">
                <h3>关键人数量</h3>
                <div class="value" id="keyPersons">-</div>
                <div>关键人</div>
            </div>
            <div class="stat-card">
                <h3>模型准确率</h3>
                <div class="value" id="modelAccuracy">-</div>
                <div>性能指标</div>
            </div>
        </div>
        
        <!-- 标签页 -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('circles')">家庭圈列表</button>
            <button class="tab" onclick="switchTab('search')">用户搜索</button>
            <button class="tab" onclick="switchTab('relationship')">关系查询</button>
            <button class="tab" onclick="switchTab('graph')">知识图谱</button>
        </div>
        
        <!-- 家庭圈列表 -->
        <div id="circles" class="tab-content active">
            <div class="search-box">
                <select id="datasetSelect" onchange="loadFamilyCircles(1)">
                    <option value="train">训练数据</option>
                    <option value="valid">验证数据</option>
                    <option value="test">测试数据</option>
                </select>
            </div>
            <div id="circlesList" class="family-circle-list">
                <div class="loading">加载中...</div>
            </div>
            <div class="pagination" id="pagination" style="display:none;">
                <button onclick="loadFamilyCircles(currentPage - 1)" id="prevBtn">上一页</button>
                <span class="page-info" id="pageInfo">第 1 页 / 共 1 页</span>
                <button onclick="loadFamilyCircles(currentPage + 1)" id="nextBtn">下一页</button>
            </div>
        </div>
        
        <!-- 用户搜索 -->
        <div id="search" class="tab-content">
            <div class="search-box">
                <select id="searchDatasetSelect">
                    <option value="train">训练数据</option>
                    <option value="valid">验证数据</option>
                    <option value="test">测试数据</option>
                </select>
                <input type="text" id="userSearchInput" placeholder="输入用户ID搜索..." oninput="handleSearchInput()">
                <button onclick="searchUser()">搜索</button>
            </div>
            <div id="searchResults" class="search-results" style="display:none;"></div>
            <div id="userInfo" class="user-info" style="display:none;">
                <h3>用户信息</h3>
                <div id="userInfoContent"></div>
            </div>
        </div>
        
        <!-- 关系查询 -->
        <div id="relationship" class="tab-content">
            <div class="relationship-check">
                <h3>检查两个用户的关系</h3>
                <div class="search-box">
                    <select id="relDatasetSelect">
                        <option value="train">训练数据</option>
                        <option value="valid">验证数据</option>
                        <option value="test">测试数据</option>
                    </select>
                    <input type="text" id="user1Input" placeholder="用户1 ID">
                    <input type="text" id="user2Input" placeholder="用户2 ID">
                    <button onclick="checkRelationship()">查询关系</button>
                </div>
                <div id="relationshipResult"></div>
            </div>
        </div>
        
        <!-- 知识图谱 -->
        <div id="graph" class="tab-content">
            <div class="graph-controls">
                <select id="graphDatasetSelect">
                    <option value="train">训练数据</option>
                    <option value="valid">验证数据</option>
                    <option value="test">测试数据</option>
                </select>
                <input type="number" id="graphCircleId" placeholder="输入家庭圈ID" style="width:200px;">
                <button onclick="loadGraph()">加载图谱</button>
            </div>
            <div id="graph-container"></div>
        </div>
        
        <!-- 数据可视化 -->
        <div id="charts" class="tab-content">
            <div class="chart-container">
                <canvas id="circleSizeChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="keyPersonChart"></canvas>
            </div>
        </div>
    </div>
    
    <script>
        let currentDataset = 'train';
        let currentPage = 1;
        let totalPages = 1;
        let statsData = null;
        let graphNetwork = null;
        let searchTimeout = null;
        
        // 加载统计信息
        async function loadStatistics() {
            try {
                const response = await fetch('/api/statistics');
                statsData = await response.json();
                
                document.getElementById('trainUsers').textContent = statsData.train.total_users;
                document.getElementById('totalCircles').textContent = statsData.train.family_circles;
                document.getElementById('keyPersons').textContent = statsData.train.key_persons;
                
                // 加载模型准确率
                try {
                    const metricsResponse = await fetch('/api/model_metrics');
                    const metrics = await metricsResponse.json();
                    document.getElementById('modelAccuracy').textContent = (metrics.accuracy * 100).toFixed(1) + '%';
                } catch (e) {
                    document.getElementById('modelAccuracy').textContent = 'N/A';
                }
            } catch (error) {
                console.error('加载统计信息失败:', error);
            }
        }
        
        // 加载家庭圈列表（支持分页）
        async function loadFamilyCircles(page = 1) {
            const dataset = document.getElementById('datasetSelect').value;
            currentDataset = dataset;
            currentPage = page;
            
            const listDiv = document.getElementById('circlesList');
            listDiv.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetch(`/api/family_circles?dataset=${dataset}&page=${page}&page_size=20`);
                const data = await response.json();
                
                if (data.circles.length === 0) {
                    listDiv.innerHTML = '<div class="loading">暂无数据</div>';
                    return;
                }
                
                totalPages = data.total_pages;
                
                listDiv.innerHTML = data.circles.map(circle => `
                    <div class="circle-card">
                        <h3>家庭圈 #${circle.circle_id} (${circle.member_count} 人)</h3>
                        ${circle.key_person_id ? `<p><strong>关键人:</strong> ${circle.key_person_id}</p>` : ''}
                        <div class="members">
                            ${circle.members.map(m => `
                                <span class="member-tag ${m.is_key_person ? 'key-person' : ''}" 
                                      onclick="viewUserInGraph('${m.user_id}')">
                                    ${m.user_id}
                                    ${m.is_key_person ? '👑' : ''}
                                </span>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
                
                // 更新分页
                const pagination = document.getElementById('pagination');
                if (totalPages > 1) {
                    pagination.style.display = 'flex';
                    document.getElementById('pageInfo').textContent = `第 ${page} 页 / 共 ${totalPages} 页`;
                    document.getElementById('prevBtn').disabled = page <= 1;
                    document.getElementById('nextBtn').disabled = page >= totalPages;
                } else {
                    pagination.style.display = 'none';
                }
            } catch (error) {
                console.error('加载家庭圈失败:', error);
                listDiv.innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        // 搜索输入处理（防抖）
        function handleSearchInput() {
            clearTimeout(searchTimeout);
            const query = document.getElementById('userSearchInput').value.trim();
            if (query.length >= 2) {
                searchTimeout = setTimeout(() => searchUser(), 300);
            } else {
                document.getElementById('searchResults').style.display = 'none';
            }
        }
        
        // 搜索用户
        async function searchUser() {
            const query = document.getElementById('userSearchInput').value.trim();
            const dataset = document.getElementById('searchDatasetSelect').value;
            
            if (!query) {
                document.getElementById('searchResults').style.display = 'none';
                return;
            }
            
            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = '<div class="loading">搜索中...</div>';
            
            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}&dataset=${dataset}`);
                const data = await response.json();
                
                if (data.results.length === 0) {
                    resultsDiv.innerHTML = '<div class="loading">未找到匹配的用户</div>';
                    return;
                }
                
                resultsDiv.innerHTML = data.results.map(result => `
                    <div class="search-result-item" onclick="selectUser('${result.user_id}', '${dataset}')">
                        <strong>${result.user_id}</strong>
                        ${result.circle_id ? ` | 家庭圈: ${result.circle_id}` : ''}
                        ${result.is_key_person ? ' 👑' : ''}
                    </div>
                `).join('');
            } catch (error) {
                console.error('搜索用户失败:', error);
                resultsDiv.innerHTML = '<div class="loading">搜索失败</div>';
            }
        }
        
        // 选择用户
        async function selectUser(userId, dataset) {
            document.getElementById('userSearchInput').value = userId;
            document.getElementById('searchResults').style.display = 'none';
            
            const userInfoDiv = document.getElementById('userInfo');
            const contentDiv = document.getElementById('userInfoContent');
            userInfoDiv.style.display = 'none';
            
            try {
                const response = await fetch(`/api/user/${userId}?dataset=${dataset}`);
                if (response.status === 404) {
                    alert('用户不存在');
                    return;
                }
                
                const user = await response.json();
                
                contentDiv.innerHTML = `
                    <div class="info-row">
                        <div class="info-label">用户ID:</div>
                        <div class="info-value">${user.user_id}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">家庭圈ID:</div>
                        <div class="info-value">${user.family_circle_id || 'N/A'}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">是否关键人:</div>
                        <div class="info-value">${user.is_key_person ? '是 👑' : '否'}</div>
                    </div>
                    ${user.family_members && user.family_members.length > 0 ? `
                        <div class="info-row">
                            <div class="info-label">家庭成员:</div>
                            <div class="info-value">${user.family_members.join(', ')}</div>
                        </div>
                    ` : ''}
                    ${user.family_circle_id ? `
                        <div class="info-row">
                            <div class="info-label">操作:</div>
                            <div class="info-value">
                                <button onclick="viewCircleGraph(${user.family_circle_id}, '${dataset}')" 
                                        style="padding: 8px 15px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">
                                    查看知识图谱
                                </button>
                            </div>
                        </div>
                    ` : ''}
                `;
                
                userInfoDiv.style.display = 'block';
            } catch (error) {
                console.error('获取用户信息失败:', error);
                alert('获取用户信息失败');
            }
        }
        
        // 检查关系
        async function checkRelationship() {
            const user1 = document.getElementById('user1Input').value.trim();
            const user2 = document.getElementById('user2Input').value.trim();
            const dataset = document.getElementById('relDatasetSelect').value;
            
            if (!user1 || !user2) {
                alert('请输入两个用户ID');
                return;
            }
            
            const resultDiv = document.getElementById('relationshipResult');
            resultDiv.innerHTML = '<div class="loading">查询中...</div>';
            
            try {
                const response = await fetch(
                    `/api/relationship?user1=${user1}&user2=${user2}&dataset=${dataset}`
                );
                const data = await response.json();
                
                if (data.error) {
                    resultDiv.innerHTML = `<div class="relationship-result not-family">${data.error}</div>`;
                    return;
                }
                
                resultDiv.innerHTML = `
                    <div class="relationship-result ${data.is_family ? 'is-family' : 'not-family'}">
                        <h4>${data.is_family ? '✓ 是同一家庭圈成员' : '✗ 不是同一家庭圈成员'}</h4>
                        <p>用户 ${user1} 和用户 ${user2}</p>
                        <p>用户1家庭圈ID: ${data.user1_circle_id}</p>
                        <p>用户2家庭圈ID: ${data.user2_circle_id}</p>
                        <p>置信度: ${(data.confidence * 100).toFixed(2)}%</p>
                        ${data.is_family ? `
                            <button onclick="viewCircleGraph(${data.user1_circle_id}, '${dataset}')" 
                                    style="margin-top: 10px; padding: 8px 15px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">
                                查看家庭圈知识图谱
                            </button>
                        ` : ''}
                    </div>
                `;
            } catch (error) {
                console.error('查询关系失败:', error);
                resultDiv.innerHTML = '<div class="loading">查询失败</div>';
            }
        }
        
        // 加载知识图谱
        async function loadGraph() {
            const circleId = document.getElementById('graphCircleId').value;
            const dataset = document.getElementById('graphDatasetSelect').value;
            
            if (!circleId) {
                alert('请输入家庭圈ID');
                return;
            }
            
            const container = document.getElementById('graph-container');
            container.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetch(`/api/circle_graph/${circleId}?dataset=${dataset}`);
                if (response.status === 404) {
                    container.innerHTML = '<div class="loading">家庭圈不存在</div>';
                    return;
                }
                
                const data = await response.json();
                
                // 创建节点和边的数据
                const nodes = new vis.DataSet(data.nodes);
                const edges = new vis.DataSet(data.edges);
                
                // 网络配置
                const options = {
                    nodes: {
                        shape: 'dot',
                        size: 20,
                        font: {
                            size: 14,
                            color: '#333'
                        },
                        borderWidth: 2,
                        shadow: true
                    },
                    edges: {
                        width: 2,
                        color: {inherit: 'from'},
                        smooth: {
                            type: 'continuous'
                        },
                        arrows: {
                            to: {
                                enabled: false
                            }
                        }
                    },
                    physics: {
                        stabilization: true,
                        barnesHut: {
                            gravitationalConstant: -2000,
                            centralGravity: 0.1,
                            springLength: 100,
                            springConstant: 0.04
                        }
                    },
                    interaction: {
                        hover: true,
                        tooltipDelay: 200,
                        zoomView: true,
                        dragView: true
                    }
                };
                
                const graphData = { nodes: nodes, edges: edges };
                graphNetwork = new vis.Network(container, graphData, options);
                
                // 添加点击事件
                graphNetwork.on("click", function (params) {
                    if (params.nodes.length > 0) {
                        const nodeId = params.nodes[0];
                        selectUser(nodeId, dataset);
                    }
                });
            } catch (error) {
                console.error('加载图谱失败:', error);
                container.innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        // 查看家庭圈图谱
        function viewCircleGraph(circleId, dataset) {
            document.getElementById('graphCircleId').value = circleId;
            document.getElementById('graphDatasetSelect').value = dataset;
            switchTab('graph');
            loadGraph();
        }
        
        // 在图谱中查看用户
        function viewUserInGraph(userId) {
            // 先获取用户的家庭圈ID
            fetch(`/api/user/${userId}?dataset=${currentDataset}`)
                .then(response => response.json())
                .then(user => {
                    if (user.family_circle_id) {
                        viewCircleGraph(user.family_circle_id, currentDataset);
                    }
                });
        }
        
        // 切换标签页
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'charts') {
                loadCharts();
            }
        }
        
        // 加载图表
        function loadCharts() {
            // 这里可以添加图表加载逻辑
            console.log('加载图表');
        }
        
        // 回车搜索
        document.getElementById('userSearchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchUser();
            }
        });
        
        // 页面加载时初始化
        window.onload = function() {
            loadStatistics();
            loadFamilyCircles(1);
        };
    </script>
</body>
</html>
